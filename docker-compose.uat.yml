services:
  kong-database:
    image: postgres:${POSTGRES_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${KONG_DATABASE_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KONG_PG_USER}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
      POSTGRES_DB: ${KONG_PG_DATABASE}
    volumes:
      - kong-postgres-data:${POSTGRES_DATA_PATH}
    networks:
      - kong-net

  kong-migration:
    image: kong/kong-gateway:${KONG_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${KONG_MIGRATION_CONTAINER_NAME}
    command: >
      sh -c "kong migrations bootstrap; kong migrations up && kong migrations finish"
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: ${KONG_PG_HOST}
      KONG_PG_PORT: ${KONG_PG_PORT}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
    depends_on:
      kong-database:
        condition: service_started
    networks:
      - kong-net

  kong:
    image: kong/kong-gateway:${KONG_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${KONG_CONTAINER_NAME}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${KONG_MEMORY_LIMIT}
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: ${KONG_PG_HOST}
      KONG_PG_PORT: ${KONG_PG_PORT}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      KONG_PROXY_LISTEN: "0.0.0.0:${KONG_PROXY_HTTP_PORT}, 0.0.0.0:${KONG_PROXY_HTTPS_PORT} ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:${KONG_ADMIN_PORT}"
      KONG_STATUS_LISTEN: "0.0.0.0:${KONG_STATUS_PORT}"
      KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL}
      KONG_NGINX_WORKER_PROCESSES: ${KONG_WORKER_PROCESSES}
      KONG_NGINX_PROXY_LARGE_CLIENT_HEADER_BUFFERS: "4 32k"
      KONG_DNS_ORDER: LAST,SRV,A,CNAME
      KONG_PLUGINS: ${KONG_PLUGINS}
      KONG_ADMIN_GUI_CUSTOM_PLUGINS: ${KONG_ADMIN_GUI_CUSTOM_PLUGINS}
      KONG_UNTRUSTED_LUA_REQUIRES: ${KONG_UNTRUSTED_LUA_REQUIRES}
      KONG_LUA_PACKAGE_PATH: ${KONG_LUA_PACKAGE_PATH}
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:${KONG_MANAGER_PORT}"
      KONG_ADMIN_GUI_PATH: /
      KONG_ADMIN_GUI_URL: ${KONG_MANAGER_URL}
      KONG_ADMIN_GUI_API_URL: ${KONG_ADMIN_URL}
      # Disable Kong's own SSL termination — Traefik handles TLS via Cloudflare Access.
      # Without this, Kong sees HTTP from Traefik but expects HTTPS (per KONG_ADMIN_GUI_URL),
      # triggering a 301 redirect loop (ERR_TOO_MANY_REDIRECTS).
      KONG_ADMIN_GUI_SSL: "off"
    ports:
      - "${KONG_PROXY_HTTP_PORT}:${KONG_PROXY_HTTP_PORT}"
      - "${KONG_PROXY_HTTPS_PORT}:${KONG_PROXY_HTTPS_PORT}"
    depends_on:
      kong-database:
        condition: service_started
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./request_validator.lua:/usr/local/kong/lib/request_validator.lua:ro
      - ./plugins/medasista-validator:/usr/local/share/lua/5.1/kong/plugins/medasista-validator:ro
    networks:
      - kong-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

      # Kong Manager UI (Root Path)
      - "traefik.http.routers.kong-manager.rule=Host(`uat-kong.medasista.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.kong-manager.entrypoints=web"
      - "traefik.http.routers.kong-manager.service=kong-manager-svc"
      - "traefik.http.routers.kong-manager.middlewares=kong-manager-headers@docker"
      - "traefik.http.routers.kong-manager.priority=90"
      - "traefik.http.services.kong-manager-svc.loadbalancer.server.port=${KONG_MANAGER_PORT}"

      # Kong Admin API (/api Path + Prefix Stripping)
      - "traefik.http.routers.kong-admin.rule=Host(`uat-kong.medasista.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kong-admin.entrypoints=web"
      - "traefik.http.routers.kong-admin.middlewares=strip-api-prefix@docker,kong-admin-headers@docker"
      - "traefik.http.routers.kong-admin.service=kong-admin-svc"
      - "traefik.http.routers.kong-admin.priority=100"
      - "traefik.http.services.kong-admin-svc.loadbalancer.server.port=${KONG_ADMIN_PORT}"

      # Middleware: Strips /api prefix before forwarding to Kong Admin API
      - "traefik.http.middlewares.strip-api-prefix.stripprefix.prefixes=/api"
      
      # Middleware: X-Forwarded-Proto=https and X-Forwarded-Port=443 for Kong Manager (Cloudflare arkasi icin)
      - "traefik.http.middlewares.kong-manager-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.kong-manager-headers.headers.customRequestHeaders.X-Forwarded-Port=443"
      
      # Middleware: X-Forwarded-Proto=https and X-Forwarded-Port=443 for Kong Admin API (Cloudflare arkasi icin)
      - "traefik.http.middlewares.kong-admin-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.kong-admin-headers.headers.customRequestHeaders.X-Forwarded-Port=443"

      # ═══════════════════════════════════════════════════════════════
      # Kong Proxy (LLM API) - uat-api.medasista.com [END-TO-END HTTPS]
      # Kendi router ve service'imizi olusturuyoruz (Dokploy'un otomatik
      # olusturdugunu bypass ediyoruz).
      # Akis: Client -> HTTPS -> Cloudflare -> Cloudflared -> Traefik
      #       (websecure entrypoint, HTTPS) -> Kong:18443 (HTTPS)
      # ═══════════════════════════════════════════════════════════════
      
      # Kendi HTTPS router'imiz (Dokploy'un router'ini bypass ediyoruz)
      - "traefik.http.routers.kong-proxy-public.rule=Host(`uat-api.medasista.com`)"
      - "traefik.http.routers.kong-proxy-public.entrypoints=websecure"
      - "traefik.http.routers.kong-proxy-public.service=kong-proxy-svc"
      - "traefik.http.routers.kong-proxy-public.tls=true"
      - "traefik.http.routers.kong-proxy-public.priority=1000"
      - "traefik.http.routers.kong-proxy-public.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kong-proxy-public.middlewares=kong-proxy-headers@docker"
      
      # Kendi service'imiz: Kong:8000'e HTTP backend
      - "traefik.http.services.kong-proxy-svc.loadbalancer.server.port=${KONG_PROXY_HTTP_PORT}"
      - "traefik.http.services.kong-proxy-svc.loadbalancer.server.scheme=http"
      - "traefik.http.services.kong-proxy-svc.loadbalancer.passhostheader=true"
      
      # Middleware: X-Forwarded-Proto=https ekle
      - "traefik.http.middlewares.kong-proxy-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"

  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${CLOUDFLARED_CONTAINER_NAME}
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      kong:
        condition: service_started
    networks:
      - dokploy-network

  victoria-metrics:
    image: victoriametrics/victoria-metrics:${VICTORIA_METRICS_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${VICTORIA_METRICS_CONTAINER_NAME}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${VICTORIA_METRICS_MEMORY_LIMIT}
    ports:
      - "${VICTORIA_METRICS_PORT}:${VICTORIA_METRICS_PORT}"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=${VICTORIA_METRICS_RETENTION_DAYS}"
      - "--httpListenAddr=:${VICTORIA_METRICS_PORT}"
      - "--memory.allowedPercent=${VICTORIA_METRICS_MEMORY_PERCENT}"
      - "--search.maxMemoryPerQuery=0"
      - "--promscrape.config=/etc/victoriametrics/scrape.yaml"
    volumes:
      - victoria-metrics-data:/storage
      - ./grafana/provisioning/scrape/scrape.yaml:/etc/victoriametrics/scrape.yaml:ro
    networks:
      - dokploy-network
      - kong-net

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${GRAFANA_CONTAINER_NAME}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEMORY_LIMIT}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
      # Make Grafana listen on its internal port (3000 by default).
      # Dokploy Traefik routes to host port GRAFANA_PORT and host->container
      # mapping (GRAFANA_PORT:GRAFANA_CONTAINER_PORT) forwards into 3000.
      GF_SERVER_HTTP_PORT: ${GRAFANA_CONTAINER_PORT}
      # Trust the X-Forwarded-Proto header from Cloudflare/Cloudflared + Dokploy
      # Traefik so Grafana does not 301 from http to https (redirect loop).
      GF_SERVER_USE_PROXY_HEADERS: "true"
      GF_SERVER_FORWARD_HEADERS: "true"
      # Skip the default plugin auto-installer. The bundled image ships with
      # elasticsearch/zipkin/etc plugin metadata owned by root, but Grafana
      # runs as UID 472 and cannot unlinkat() them on startup. We don't use
      # those data sources anyway (we only have prometheus/VictoriaMetrics),
      # so disable auto-install instead of wrestling with file ownership.
      GF_PLUGIN_AUTO_INSTALL_DISABLED: "true"
      # Anonymous access only — Cloudflare Access handles authentication,
      # so disable Grafana's own login form and sign-out menu entirely.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: ${GF_AUTH_ANONYMOUS_ORG_NAME}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GF_AUTH_ANONYMOUS_ORG_ROLE}
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_AUTH_BASIC_ENABLED: ${GF_AUTH_BASIC_ENABLED}
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_CONTAINER_PORT}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dokploy-network
      - kong-net
    depends_on:
      - victoria-metrics
    # EXACT SAME PATTERN AS KONG: Cloudflare Access is enabled on this domain,
    # so Cloudflare handles TLS termination and authentication. Cloudflare Tunnel
    # sends plain HTTP to Traefik on the 'web' entrypoint. We inject
    # X-Forwarded-Proto=https so Grafana sees the original scheme and does not
    # 301-loop. NO websecure router, NO redirect-to-https middleware.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Backend service: container port 3000.
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=${GRAFANA_CONTAINER_PORT}"
      # Middleware: inject X-Forwarded-Proto=https so Grafana (with
      # GF_SERVER_USE_PROXY_HEADERS=true) sees the original https scheme
      # and does not 301-loop.
      - "traefik.http.middlewares.grafana-proxy-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      # Router for the public hostname on the 'web' entrypoint (no TLS, plain HTTP).
      - "traefik.http.routers.grafana-public.rule=Host(`uat-kong-grafana.medasista.com`)"
      - "traefik.http.routers.grafana-public.entrypoints=web"
      - "traefik.http.routers.grafana-public.service=grafana-svc"
      - "traefik.http.routers.grafana-public.middlewares=grafana-proxy-headers@docker"

  loki:
    image: grafana/loki:${LOKI_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${LOKI_CONTAINER_NAME}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${LOKI_MEMORY_LIMIT}
    command: -config.file=/etc/loki/config.yml
    user: "${LOKI_UID}:${LOKI_UID}"
    ports:
      - "${LOKI_PORT}:${LOKI_CONTAINER_PORT}"
    volumes:
      - loki-data:/loki
      - ./loki/config.yml:/etc/loki/config.yml:ro
    networks:
      - kong-net
      - dokploy-network

  kafka:
    # Single-node Kafka in KRaft mode (no Zookeeper).
    # Official Apache Kafka image (apache/kafka on Docker Hub).
    # Note: env var names are KAFKA_* (NOT KAFKA_CFG_* — that was Bitnami).
    # KAFKA_BROKER_VERSION holds image:tag in dokploy.md; user pins the exact version.
    image: ${KAFKA_BROKER_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${KAFKA_BROKER_CONTAINER_NAME}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${KAFKA_MEMORY_LIMIT}
    user: "${KAFKA_BROKER_UID}:${KAFKA_BROKER_UID}"
    ports:
      - "${KAFKA_BROKER_PORT}:${KAFKA_BROKER_CONTAINER_PORT}"
    environment:
      # KRaft single-node cluster — node 0 wears both controller and broker hats.
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@localhost:${KAFKA_BROKER_CONTROLLER_PORT}"
      KAFKA_LISTENERS: "PLAINTEXT://:${KAFKA_BROKER_CONTAINER_PORT},CONTROLLER://:${KAFKA_BROKER_CONTROLLER_PORT}"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:${KAFKA_BROKER_CONTAINER_PORT}"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Auto-create topics is fine for UAT; flip off in prod.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Where Kafka stores its data — mount the volume here.
      KAFKA_LOG_DIR: "/var/lib/kafka/data"
      # Cluster ID for KRaft mode (any valid base64 UUID works).
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
      KAFKA_MESSAGE_MAX_BYTES: "16777216"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "16777216"
      KAFKA_FETCH_MESSAGE_MAX_BYTES: "16777216"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kong-net
      - dokploy-network

  kafka-ui:
    # Admin panel for Kafka. UI itself has no auth (Cloudflare Access protects it).
    # KAFKA_UI_VERSION holds image:tag in dokploy.md; user pins the exact version.
    image: ${KAFKA_UI_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    container_name: ${KAFKA_UI_CONTAINER_NAME}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${KAFKA_UI_MEMORY_LIMIT}
    ports:
      - "${KAFKA_UI_PORT}:${KAFKA_UI_CONTAINER_PORT}"
    environment:
      KAFKA_CLUSTERS_0_NAME: uat
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:${KAFKA_BROKER_CONTAINER_PORT}
      # Auth disabled at the panel level; Cloudflare Access is the gate.
      AUTH_TYPE: ${KAFKA_UI_AUTH_TYPE}
      # Trust X-Forwarded-* headers from Traefik. Spring Boot default is NONE,
      # which means the app sees the real request scheme (http, after Traefik
      # terminates the TLS upstream) and 301-redirects to https -> Cloudflare
      # re-strips -> ERR_TOO_MANY_REDIRECTS. FRAMEWORK configures Spring WebFlux's
      # ForwardedHeaderTransformer to honor X-Forwarded-Proto at the container
      # level — kafka-ui runs on Netty (not Tomcat), so NATIVE does NOT work;
      # FRAMEWORK is required for reactive/Netty Spring Boot apps.
      SERVER_FORWARD_HEADERS_STRATEGY: ${KAFKA_UI_FORWARD_HEADERS_STRATEGY}
    depends_on:
      - kafka
    networks:
      - dokploy-network
      - kong-net
    # EXACT SAME PATTERN AS KONG: Cloudflare Access is enabled on this domain,
    # so Cloudflare handles TLS termination and authentication. Cloudflare Tunnel
    # sends plain HTTP to Traefik on the 'web' entrypoint. We inject
    # X-Forwarded-Proto=https so kafka-ui sees the original scheme and does not
    # 301-loop. NO websecure router, NO redirect-to-https middleware.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Backend service: container port 8080.
      - "traefik.http.services.kafka-ui-svc.loadbalancer.server.port=${KAFKA_UI_CONTAINER_PORT}"
      # Middleware: inject X-Forwarded-Proto=https so kafka-ui (with FRAMEWORK
      # forward headers strategy via Spring WebFlux ForwardedHeaderTransformer)
      # sees the original https scheme and does not 301-loop.
      - "traefik.http.middlewares.kafka-ui-proxy-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      # Router for the public hostname on the 'web' entrypoint (no TLS, plain HTTP).
      - "traefik.http.routers.kafka-ui-public.rule=Host(`uat-kong-kafka.medasista.com`)"
      - "traefik.http.routers.kafka-ui-public.entrypoints=web"
      - "traefik.http.routers.kafka-ui-public.service=kafka-ui-svc"
      - "traefik.http.routers.kafka-ui-public.middlewares=kafka-ui-proxy-headers@docker"

volumes:
  kong-postgres-data:
    name: ${KONG_POSTGRES_VOLUME_NAME}
  victoria-metrics-data:
    name: ${VICTORIA_METRICS_VOLUME_NAME}
  grafana-data:
    name: ${GRAFANA_VOLUME_NAME}
  loki-data:
    name: ${LOKI_VOLUME_NAME}
  kafka-data:
    name: ${KAFKA_VOLUME_NAME}

networks:
  kong-net:
    driver: bridge
    name: ${KONG_NETWORK_NAME}
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK_NAME}
      DUMMY_VAR_FORCE_UPDATE: 1
