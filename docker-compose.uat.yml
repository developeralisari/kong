services:

  # ─── Kong Veritabanı ───────────────────────────────────────────────────────
  kong-database:
    image: postgres:18.1
    container_name: uat-kong-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KONG_PG_USER}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
      POSTGRES_DB: ${KONG_PG_DATABASE}
    volumes:
      - kong-postgres-data:/var/lib/postgresql
    networks:
      - kong-net

  # ─── Kong DB Migration (bir kez çalışır, başarılı olunca durur) ────────────
  kong-migration:
    image: kong/kong-gateway:3.9.1.1
    container_name: uat-kong-migration
    command: >
      sh -c "kong migrations bootstrap; kong migrations up && kong migrations finish"
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
    depends_on:
      kong-database:
        condition: service_started
    networks:
      - kong-net

  # ─── Kong API Gateway ──────────────────────────────────────────────────────
  kong:
    image: kong/kong-gateway:3.9.1.1
    container_name: uat-kong-gateway
    restart: unless-stopped
    environment:
      # Veritabanı
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}

      # Proxy dinleyicileri
      KONG_PROXY_LISTEN: "0.0.0.0:${KONG_PROXY_HTTP_PORT}, 0.0.0.0:${KONG_PROXY_HTTPS_PORT} ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:${KONG_ADMIN_PORT}"
      KONG_STATUS_LISTEN: "0.0.0.0:${KONG_STATUS_PORT}"

      # Güvenilir IP'ler (reverse proxy arkasında çalışıyorsa)
      KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"

      # Log ayarları
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL}

      # Performans
      KONG_NGINX_WORKER_PROCESSES: ${KONG_WORKER_PROCESSES}
      KONG_NGINX_PROXY_LARGE_CLIENT_HEADER_BUFFERS: "4 32k"

      # DNS — dokploy-network içindeki servis adlarını çözümler
      # KONG_DNS_RESOLVER ayarlanmadı: Kong /etc/resolv.conf'u (Docker embedded DNS 127.0.0.11) kullanır
      KONG_DNS_ORDER: LAST,SRV,A,CNAME

      KONG_PLUGINS: bundled

      # Kong Manager
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:${KONG_MANAGER_PORT}"
      KONG_ADMIN_GUI_PATH: /
      KONG_ADMIN_GUI_URL: ${KONG_MANAGER_URL}
      KONG_ADMIN_GUI_API_URL: ${KONG_ADMIN_API_URL}

    ports:
      # Yalnızca proxy portları host'a yayınlanır.
      # Admin (18001), Status (18100) ve Manager (18002) yayınlanmaz:
      # bunlara dokploy-network üzerinden (reverse-proxy/Traefik) erişilir, public IP'den değil.
      - "${KONG_PROXY_HTTP_PORT}:${KONG_PROXY_HTTP_PORT}"
      - "${KONG_PROXY_HTTPS_PORT}:${KONG_PROXY_HTTPS_PORT}"

    depends_on:
      kong-database:
        condition: service_started
      kong-migration:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - kong-net
      - dokploy-network

  # ─── Cloudflare Tunnel — Kong + VictoriaMetrics + Grafana'yı güvenli yayınlar ─
  # Sunucuda açık port olmadan, Cloudflare edge'den iç servis'e tünel kurar.
  # Token dokploy env'e TUNNEL_TOKEN olarak girilir (değer sadece eyJ... token'ı).
  #
  # Cloudflare panelinde "Public Hostname" eşlemeleri (aynı ağdaki konteyner adı + port):
  #   uat-kong.medasista.com             -> http://uat-kong-gateway:${KONG_MANAGER_PORT}
  #   uat-kong-admin.medasista.com       -> http://uat-kong-gateway:${KONG_ADMIN_PORT}
  #   uat-kong-grafana.medasista.com     -> http://uat-grafana:3000
  #   (VictoriaMetrics public'e açılmaz — sadece Grafana sorgular, dışarıya kapalı)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: uat-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      kong:
        condition: service_started
    networks:
      - dokploy-network

  # ─── VictoriaMetrics — Kong metriklerini toplar (Prometheus drop-in) ────────
  # /metrics endpoint'i Kong üzerindeki prometheus plugin tarafından yayınlanır
  # (Plugin'i Kong Manager'dan veya Admin API'den global enable et).
  # VictoriaMetrics her 60 saniyede bir Kong'u scrape eder.
  # Veri 30 gün saklanır (retention), sonra otomatik silinir.
  victoria-metrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: uat-victoria-metrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30"
      - "--httpListenAddr=:8428"
      # Düşük kaynak kullanımı için
      - "--memory.allowedPercent=40"
      - "--search.maxMemoryPerQuery=0"
      # Kong'un /metrics endpoint'ini scrape et
      - "--promscrape.config=/etc/victoriametrics/scrape.yaml"
    volumes:
      - victoria-metrics-data:/storage
      - ./grafana/provisioning/scrape/scrape.yaml:/etc/victoriametrics/scrape.yaml:ro
    networks:
      - dokploy-network
      - kong-net
    # Dışarıya port açmıyoruz — sadece aynı network'teki Grafana erişir.
    # Dışarıdan VictoriaMetrics'e erişmek için Cloudflare Tunnel'de
    # bu servise Public Hostname tanımlamaya GEREK YOK (güvenlik).

  # ─── Grafana — VictoriaMetrics üstünde dashboard ───────────────────────────
  # Default admin kullanıcısı "admin", şifre GF_ADMIN_PASSWORD env'inden gelir.
  # Datasource olarak VictoriaMetrics otomatik provision edilir (aşağıdaki ./grafana).
  grafana:
    image: grafana/grafana:latest
    container_name: uat-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: https://uat-kong-grafana.medasista.com
      # Storage path'ini daha güvenli bir yere al
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dokploy-network
      - kong-net
    depends_on:
      - victoria-metrics


# ─── Volume'lar ───────────────────────────────────────────────────────────────
volumes:
  kong-postgres-data:
    name: uat-kong-postgres-data-v2
  victoria-metrics-data:
    name: uat-victoria-metrics-data
  grafana-data:
    name: uat-grafana-data

# ─── Ağlar ────────────────────────────────────────────────────────────────────
networks:
  kong-net:
    driver: bridge
    name: kong-net

  dokploy-network:
    external: true   # dokploy compose ile paylaşılan ağ
