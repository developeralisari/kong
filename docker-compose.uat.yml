services:
  kong-database:
    image: postgres:${POSTGRES_VERSION}
    container_name: ${KONG_DATABASE_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KONG_PG_USER}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
      POSTGRES_DB: ${KONG_PG_DATABASE}
    volumes:
      - kong-postgres-data:${POSTGRES_DATA_PATH}
    networks:
      - kong-net

  kong-migration:
    image: kong/kong-gateway:${KONG_VERSION}
    container_name: ${KONG_MIGRATION_CONTAINER_NAME}
    command: >
      sh -c "kong migrations bootstrap; kong migrations up && kong migrations finish"
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: ${KONG_PG_HOST}
      KONG_PG_PORT: ${KONG_PG_PORT}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
    depends_on:
      kong-database:
        condition: service_started
    networks:
      - kong-net

  kong:
    image: kong/kong-gateway:${KONG_VERSION}
    container_name: ${KONG_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: ${KONG_PG_HOST}
      KONG_PG_PORT: ${KONG_PG_PORT}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      KONG_PROXY_LISTEN: "0.0.0.0:${KONG_PROXY_HTTP_PORT}, 0.0.0.0:${KONG_PROXY_HTTPS_PORT} ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:${KONG_ADMIN_PORT}"
      KONG_STATUS_LISTEN: "0.0.0.0:${KONG_STATUS_PORT}"
      KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL}
      KONG_NGINX_WORKER_PROCESSES: ${KONG_WORKER_PROCESSES}
      KONG_NGINX_PROXY_LARGE_CLIENT_HEADER_BUFFERS: "4 32k"
      KONG_DNS_ORDER: LAST,SRV,A,CNAME
      KONG_PLUGINS: ${KONG_PLUGINS}
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:${KONG_MANAGER_PORT}"
      KONG_ADMIN_GUI_PATH: /
      KONG_ADMIN_GUI_URL: ${KONG_MANAGER_URL}
      KONG_ADMIN_GUI_API_URL: ${KONG_ADMIN_URL}
    ports:
      - "${KONG_PROXY_HTTP_PORT}:${KONG_PROXY_HTTP_PORT}"
      - "${KONG_PROXY_HTTPS_PORT}:${KONG_PROXY_HTTPS_PORT}"
    depends_on:
      kong-database:
        condition: service_started
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - kong-net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

      # Kong Manager UI (Root Path)
      - "traefik.http.routers.kong-manager.rule=Host(`uat-kong.medasista.com`)"
      - "traefik.http.routers.kong-manager.entrypoints=web"
      - "traefik.http.routers.kong-manager.service=kong-manager-svc"
      - "traefik.http.services.kong-manager-svc.loadbalancer.server.port=18002"

      # Kong Admin API (/api Path + Prefix Stripping)
      - "traefik.http.routers.kong-admin.rule=Host(`uat-kong.medasista.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kong-admin.middlewares=strip-api-prefix"
      - "traefik.http.routers.kong-admin.service=kong-admin-svc"
      - "traefik.http.services.kong-admin-svc.loadbalancer.server.port=18001"

      # Middleware: Strips /api prefix before forwarding to Kong Admin API
      - "traefik.http.middlewares.strip-api-prefix.stripprefix.prefixes=/api"

  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION}
    container_name: ${CLOUDFLARED_CONTAINER_NAME}
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      kong:
        condition: service_started
    networks:
      - dokploy-network

  victoria-metrics:
    image: victoriametrics/victoria-metrics:${VICTORIA_METRICS_VERSION}
    container_name: ${VICTORIA_METRICS_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${VICTORIA_METRICS_PORT}:${VICTORIA_METRICS_PORT}"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=${VICTORIA_METRICS_RETENTION_DAYS}"
      - "--httpListenAddr=:${VICTORIA_METRICS_PORT}"
      - "--memory.allowedPercent=${VICTORIA_METRICS_MEMORY_PERCENT}"
      - "--search.maxMemoryPerQuery=0"
      - "--promscrape.config=/etc/victoriametrics/scrape.yaml"
    volumes:
      - victoria-metrics-data:/storage
      - ./grafana/provisioning/scrape/scrape.yaml:/etc/victoriametrics/scrape.yaml:ro
    networks:
      - dokploy-network
      - kong-net

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: ${GRAFANA_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL}
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
      # Make Grafana listen on its internal port (3000 by default).
      # Dokploy Traefik routes to host port GRAFANA_PORT and host->container
      # mapping (GRAFANA_PORT:GRAFANA_CONTAINER_PORT) forwards into 3000.
      GF_SERVER_HTTP_PORT: ${GRAFANA_CONTAINER_PORT}
      # Trust the X-Forwarded-Proto header from Cloudflare/Cloudflared + Dokploy
      # Traefik so Grafana does not 301 from http to https (redirect loop).
      GF_SERVER_USE_PROXY_HEADERS: "true"
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_CONTAINER_PORT}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dokploy-network
      - kong-net
    depends_on:
      - victoria-metrics
    # Same Traefik pattern as the kong service: explicit labels that match
    # what we tested working yesterday. Dokploy's auto-injected labels
    # would otherwise not include the X-Forwarded-* headers and Grafana
    # loops on the http->https redirect.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Backend service: container port 3000.
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=${GRAFANA_CONTAINER_PORT}"
      # Middleware: inject X-Forwarded-Proto and X-Forwarded-Host so Grafana
      # trusts the original https scheme from Cloudflare.
      - "traefik.http.middlewares.grafana-proxy-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.grafana-proxy-headers.headers.customRequestHeaders.X-Forwarded-Host=${GRAFANA_PUBLIC_URL}"
      # Router for the public hostname, websecure entrypoint (TLS terminated by Dokploy Let's Encrypt).
      - "traefik.http.routers.grafana-public.rule=Host(`uat-kong-grafana.medasista.com`)"
      - "traefik.http.routers.grafana-public.entrypoints=websecure"
      - "traefik.http.routers.grafana-public.tls=true"
      - "traefik.http.routers.grafana-public.service=grafana-svc"
      - "traefik.http.routers.grafana-public.middlewares=grafana-proxy-headers@docker"

volumes:
  kong-postgres-data:
    name: ${KONG_POSTGRES_VOLUME_NAME}
  victoria-metrics-data:
    name: ${VICTORIA_METRICS_VOLUME_NAME}
  grafana-data:
    name: ${GRAFANA_VOLUME_NAME}

networks:
  kong-net:
    driver: bridge
    name: ${KONG_NETWORK_NAME}
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK_NAME}
