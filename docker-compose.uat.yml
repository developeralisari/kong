services:

  # ─── Kong Veritabanı ───────────────────────────────────────────────────────
  kong-database:
    image: postgres:18.1
    container_name: uat-kong-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KONG_PG_USER}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
      POSTGRES_DB: ${KONG_PG_DATABASE}
    volumes:
      - kong-postgres-data:/var/lib/postgresql
    networks:
      - kong-net

  # ─── Kong DB Migration (bir kez çalışır, başarılı olunca durur) ────────────
  kong-migration:
    image: kong:3.9.1
    container_name: uat-kong-migration
    command: kong migrations bootstrap
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
    depends_on:
      kong-database:
        condition: service_started
    networks:
      - kong-net

  # ─── Kong API Gateway ──────────────────────────────────────────────────────
  kong:
    image: kong:3.9.1
    container_name: uat-kong-gateway
    restart: unless-stopped
    environment:
      # Veritabanı
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}

      # Proxy dinleyicileri
      KONG_PROXY_LISTEN: "0.0.0.0:${KONG_PROXY_HTTP_PORT}, 0.0.0.0:${KONG_PROXY_HTTPS_PORT} ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:${KONG_ADMIN_PORT}"
      KONG_STATUS_LISTEN: "0.0.0.0:${KONG_STATUS_PORT}"

      # Güvenilir IP'ler (reverse proxy arkasında çalışıyorsa)
      KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"

      # Log ayarları
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL}

      # Performans
      KONG_NGINX_WORKER_PROCESSES: ${KONG_WORKER_PROCESSES}
      KONG_NGINX_PROXY_LARGE_CLIENT_HEADER_BUFFERS: "4 32k"

      # DNS — dokploy-network içindeki servis adlarını çözümler
      KONG_DNS_RESOLVER: ""
      KONG_DNS_ORDER: LAST,SRV,A,CNAME

      KONG_PLUGINS: bundled

    ports:
      - "${KONG_PROXY_HTTP_PORT}:${KONG_PROXY_HTTP_PORT}"
      - "${KONG_PROXY_HTTPS_PORT}:${KONG_PROXY_HTTPS_PORT}"
      - "${KONG_ADMIN_PORT}:${KONG_ADMIN_PORT}"
      - "${KONG_STATUS_PORT}:${KONG_STATUS_PORT}"

    depends_on:
      kong-database:
        condition: service_started
      kong-migration:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - kong-net
      - dokploy-network

  # ─── Konga Web UI ─────────────────────────────────────────────────────────────
  konga:
    image: pantsel/konga:latest
    container_name: uat-konga
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TOKEN_SECRET: ${KONGA_TOKEN_SECRET}
      PORT: ${KONGA_PORT}
    ports:
      - "${KONGA_PORT}:${KONGA_PORT}"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - dokploy-network

# ─── Volume'lar ───────────────────────────────────────────────────────────────
volumes:
  kong-postgres-data:
    name: uat-kong-postgres-data

# ─── Ağlar ────────────────────────────────────────────────────────────────────
networks:
  kong-net:
    driver: bridge
    name: kong-net

  dokploy-network:
    external: true   # dokploy compose ile paylaşılan ağ
