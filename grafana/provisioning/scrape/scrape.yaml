# VictoriaMetrics scrape config
# Kong'un prometheus plugin'i /metrics endpoint'ini KONG_STATUS_PORT (18100) üzerinde yayınlar.
# Bu dosyayı VictoriaMetrics container'ına mount ediyoruz.

scrape_configs:
  - job_name: 'kong'
    metrics_path: /metrics
    scrape_interval: 60s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - 'kong:18100'
        labels:
          environment: 'uat'
          cluster: 'medasista-kong'
