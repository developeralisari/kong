scrape_configs:
  - job_name: 'kong'
    metrics_path: /metrics
    scheme: https
    scrape_interval: 30s
    scrape_timeout: 10s
    tls_config:
      insecure_skip_verify: true   # UAT self-signed Cloudflare cert; prod'da kaldır
    static_configs:
      - targets:
          - 'uat-kong-gateway:18443'   # container_name:proxy_https_port
        labels:
          environment: 'uat'
          cluster: 'medasista-kong'
          job: 'kong-gateway'
