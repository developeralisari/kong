scrape_configs:
  - job_name: 'kong'
    metrics_path: /metrics
    scrape_interval: 60s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - '${KONG_PG_HOST}:${KONG_STATUS_PORT}'
        labels:
          environment: '${SCRAPE_ENVIRONMENT}'
          cluster: '${SCRAPE_CLUSTER}'
