###############################################################################
# Grafana configuration for the MedAsista Kong UAT stack.
# Mounted at /etc/grafana/grafana.ini in the container (see compose volume).
#
# This file overrides only the sections that env-vars cannot reach on
# Grafana 12.x — most importantly the auth provider order. Any other
# setting that works as a GF_* env var continues to come from dokploy.md.
###############################################################################

[auth]
# Run the anonymous provider before basic. Without this, Grafana
# still challenges for /login on every request even when
# GF_AUTH_ANONYMOUS_ENABLED=true is set, because the provider list
# defaults to ["basic"].
providers = [anonymous, basic]

[auth.anonymous]
enabled = true
org_name = MedAsista
org_role = Admin

[auth.basic]
enabled = false

[security]
admin_user = admin

[server]
root_url = https://uat-kong-grafana.medasista.com
serve_from_sub_path = false
x_forwarded_headers_enabled = true

[users]
allow_sign_up = false
