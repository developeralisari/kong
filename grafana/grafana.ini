###############################################################################
# Grafana configuration for the MedAsista Kong UAT stack.
# Mounted at /etc/grafana/grafana.ini in the container (see compose volume).
#
# Auth settings (anonymous, provider order, login form) are set via env vars
# in docker-compose.uat.yml (GF_AUTH_*) so they live in one place and Dokploy
# env panel reflects them directly. This file keeps only the settings that
# cannot be reached from env on Grafana 12.x (paths, x-forwarded headers).
###############################################################################

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Admin

[security]
admin_user = admin
# Cloudflare Access handles TLS end-to-end, so Grafana's own Secure cookie
# flag is unnecessary. Setting it to true causes the browser to drop the
# cookie on the http:// hop between Traefik and Grafana, which triggers
# a redirect loop (ERR_TOO_MANY_REDIRECTS).
cookie_secure = false
cookie_samesite = lax

[server]
root_url = https://uat-kong-grafana.medasista.com
serve_from_sub_path = false
x_forwarded_headers_enabled = true

[users]
allow_sign_up = false

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning
